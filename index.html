<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리듬게임 채보 오토 에디터</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #121212;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
        h2 { 
            color: #00e5ff; 
            margin-top: 0;
            text-align: center;
        }
        .input-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        label {
            width: 160px;
            font-weight: bold;
            font-size: 14px;
            color: #ccc;
        }
        input[type="text"], input[type="number"] {
            flex: 1;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
        }
        input[type="file"] {
            color: #00e5ff;
        }
        .record-box {
            text-align: center;
            padding: 25px;
            background: #181818;
            border: 2px dashed #00e5ff;
            border-radius: 10px;
            margin: 20px 0;
        }
        .key-guide {
            font-size: 18px;
            color: #ffbb00;
            margin-top: 10px;
            font-weight: bold;
        }
        .key-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        .key-btn {
            width: 50px;
            height: 50px;
            background: #333;
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #aaa;
            transition: all 0.05s ease;
        }
        .key-btn.active {
            background: #00e5ff;
            color: #000;
            box-shadow: 0 0 12px #00e5ff;
            transform: scale(0.95);
        }
        textarea {
            width: 100%;
            height: 280px;
            background: #0a0a0a;
            color: #00ff88;
            font-family: 'Courier New', Courier, monospace;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            resize: vertical;
        }
        button.copy-btn {
            width: 100%;
            padding: 14px;
            background: #00e5ff;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button.copy-btn:hover {
            background: #00b8cc;
        }
        .note-count {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎵 리듬게임 오토 에디터</h2>

    <div class="input-group">
        <label>1. 내 음원 파일 선택:</label>
        <input type="file" id="audioFileInput" accept="audio/*" onchange="handleAudioSelect(event)">
    </div>
    <div class="input-group">
        <label>2. 곡 제목 (Title):</label>
        <input type="text" id="songTitle" value="신곡 이름" oninput="updateOutput()">
    </div>
    <div class="input-group">
        <label>3. BPM:</label>
        <input type="number" id="songBpm" value="120" oninput="updateOutput()">
    </div>
    <div class="input-group">
        <label>4. 깃허브 음원 파일명:</label>
        <input type="text" id="audioFileName" value="song.mp3" placeholder="예: song.mp3" oninput="updateOutput()">
    </div>
    <div class="input-group">
        <label>5. 노트 이동 속도:</label>
        <input type="number" id="songSpeed" value="450" oninput="updateOutput()">
    </div>

    <div class="record-box">
        <h3>[ SPACEBAR ] 누르면 음악 재생 + 녹음 시작/정지</h3>
        <p style="color:#aaa; font-size:13px;">※ 입력창 수정 중일 때는 스페이스바가 녹음으로 작동하지 않습니다.</p>
        
        <div class="key-guide">입력 키: D, F, J, K</div>
        
        <div class="key-display">
            <div class="key-btn" id="key-d">D</div>
            <div class="key-btn" id="key-f">F</div>
            <div class="key-btn" id="key-j">J</div>
            <div class="key-btn" id="key-k">K</div>
        </div>

        <h2 id="statusText" style="color: #ff3355; margin-top:20px;">먼저 1번에서 음원 파일(.mp3)을 선택하세요</h2>
        <div class="note-count">기록된 노트 수: <span id="noteCount" style="color:#00e5ff; font-weight:bold;">0</span>개</div>
    </div>

    <h3>최종 생성 코드 (복사해서 곡 JS 파일에 붙여넣기)</h3>
    <textarea id="outputCode" readonly></textarea>
    <button class="copy-btn" onclick="copyCode()">코드 전체 복사하기</button>
</div>

<audio id="bgmAudio"></audio>

<script>
    let isRecording = false;
    let recordedNotes = [];
    const targetKeys = ['d', 'f', 'j', 'k'];
    const bgmAudio = document.getElementById('bgmAudio');
    let isAudioLoaded = false;

    // 음원 파일 선택 처리
    function handleAudioSelect(event) {
        const file = event.target.files[0];
        if (file) {
            const fileURL = URL.createObjectURL(file);
            bgmAudio.src = fileURL;
            isAudioLoaded = true;

            // 파일명 자동 세팅
            document.getElementById('audioFileName').value = file.name;
            
            const status = document.getElementById('statusText');
            status.innerText = "준비 완료! [SPACEBAR]를 누르면 녹음이 시작됩니다.";
            status.style.color = "#00e5ff";
            
            updateOutput();
        }
    }

    // 키보드 누름 감지
    window.addEventListener('keydown', (e) => {
        // 입력창(input)을 수정 중일 때는 녹음 동작 방지
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        const key = e.key.toLowerCase();

        // 스페이스바로 녹음 시작/정지
        if (e.code === 'Space') {
            e.preventDefault();
            if (!isAudioLoaded) {
                alert("상단의 [1. 내 음원 파일 선택]에서 음악 파일을 먼저 선택해 주세요!");
                return;
            }
            toggleRecord();
            return;
        }

        // D, F, J, K 키 눌렀을 때
        const keyIndex = targetKeys.indexOf(key);
        if (keyIndex !== -1) {
            // UI 시각 효과 (버튼 반짝임)
            const keyEl = document.getElementById(`key-${key}`);
            if (keyEl) keyEl.classList.add('active');

            // 녹음 중일 때 노트 채록
            if (isRecording) {
                // 음악의 현재 재생 시간 기준 (초 단위, 소수점 3자리)
                const currentTime = bgmAudio.currentTime || 0;
                const noteTime = parseFloat(currentTime.toFixed(3));

                recordedNotes.push({ time: noteTime, lane: keyIndex });
                document.getElementById('noteCount').innerText = recordedNotes.length;
                updateOutput();
            }
        }
    });

    // 키 뗐을 때 UI 원복
    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        const keyEl = document.getElementById(`key-${key}`);
        if (keyEl) keyEl.classList.remove('active');
    });

    // 음악이 끝까지 재생되면 자동 녹음 종료
    bgmAudio.onended = () => {
        if (isRecording) toggleRecord();
    };

    // 녹음 토글
    function toggleRecord() {
        isRecording = !isRecording;
        const status = document.getElementById('statusText');

        if (isRecording) {
            recordedNotes = [];
            document.getElementById('noteCount').innerText = "0";
            bgmAudio.currentTime = 0;
            
            let playPromise = bgmAudio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    status.innerText = "🔴 음악 재생 중! 박자에 맞춰 D, F, J, K를 누르세요!";
                    status.style.color = "#00ff88";
                }).catch(err => {
                    console.error("재생 오류:", err);
                    isRecording = false;
                    status.innerText = "오디오 재생에 실패했습니다.";
                });
            }
        } else {
            bgmAudio.pause();
            status.innerText = "⏹️ 녹음 완료! 아래 코드를 복사해서 파일에 넣으세요.";
            status.style.color = "#ffbb00";
        }
        updateOutput();
    }

    // 결과 JS 코드 업데이트
    function updateOutput() {
        const title = document.getElementById('songTitle').value || '제목 없음';
        const bpm = parseInt(document.getElementById('songBpm').value) || 120;
        let audioName = document.getElementById('audioFileName').value.trim();
        const speed = parseInt(document.getElementById('songSpeed').value) || 450;

        if (audioName && !audioName.endsWith('.mp3') && !audioName.endsWith('.wav') && !audioName.endsWith('.ogg')) {
            audioName += '.mp3';
        }

        const bgmPath = audioName ? `audio/${audioName}` : 'audio/';
        let notesText = JSON.stringify(recordedNotes, null, 4);

        const fullCode = `if (typeof SONG_DATABASE === 'undefined') {
    var SONG_DATABASE = [];
}

SONG_DATABASE.push({
    title: "${title}",
    bpm: ${bpm},
    bgm: "${bgmPath}",
    speed: ${speed},
    notes: ${notesText}
});`;

        document.getElementById('outputCode').value = fullCode;
    }

    // 코드 복사
    function copyCode() {
        const codeText = document.getElementById('outputCode');
        codeText.select();
        document.execCommand('copy');
        alert("코드가 클립보드에 복사되었습니다! songs/ 폴더 안의 곡 JS 파일에 붙여넣으세요.");
    }

    updateOutput();
</script>

</body>
</html>
