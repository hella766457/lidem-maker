<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리듬게임 채보 오토 에디터</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
        }
        h2 { color: #00e5ff; }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 140px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"] {
            padding: 8px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
            width: 250px;
        }
        input[type="file"] {
            color: #00e5ff;
        }
        .record-box {
            text-align: center;
            padding: 25px;
            background: #222;
            border: 2px dashed #00e5ff;
            border-radius: 8px;
            margin: 20px 0;
        }
        .key-guide {
            font-size: 18px;
            color: #ffbb00;
            margin-top: 10px;
        }
        textarea {
            width: 100%;
            height: 300px;
            background: #111;
            color: #00ff88;
            font-family: monospace;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            padding: 12px 20px;
            background: #00e5ff;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #00b8cc;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎵 채보 자동 생성 오토 에디터 (음원 동기화)</h2>

    <div class="input-group">
        <label>1. 음원 파일 선택:</label>
        <input type="file" id="audioFileInput" accept="audio/*" onchange="handleAudioSelect(event)">
    </div>
    <div class="input-group">
        <label>2. 곡 제목 (Title):</label>
        <input type="text" id="songTitle" value="신곡 이름" oninput="updateOutput()">
    </div>
    <div class="input-group">
        <label>3. BPM:</label>
        <input type="number" id="songBpm" value="120" oninput="updateOutput()">
    </div>
    <div class="input-group">
        <label>4. 깃허브 음원 파일명:</label>
        <input type="text" id="audioFileName" value="anzs_raid.mp3" placeholder="예: song.mp3" oninput="updateOutput()">
    </div>
    <div class="input-group">
        <label>5. 노트 속도:</label>
        <input type="number" id="songSpeed" value="450" oninput="updateOutput()">
    </div>

    <div class="record-box">
        <h3>[ SPACEBAR ] 누르면 음악 재생 + 녹음 시작/정지</h3>
        <p>음악에 맞춰 키를 누르면 노트가 기록됩니다.</p>
        <div class="key-guide">사용 키: D, F, J, K</div>
        <h2 id="statusText" style="color: #ff3355; margin-top:15px;">음원 파일을 선택해 주세요</h2>
    </div>

    <h3>최종 생성 코드 (복사해서 곡 JS 파일에 붙여넣기)</h3>
    <textarea id="outputCode" readonly></textarea>
    <br><br>
    <button onclick="copyCode()">코드 전체 복사하기</button>
</div>

<audio id="bgmAudio"></audio>

<script>
    let isRecording = false;
    let recordedNotes = [];
    const targetKeys = ['d', 'f', 'j', 'k'];
    const bgmAudio = document.getElementById('bgmAudio');
    let isAudioLoaded = false;

    // 내 컴퓨터에서 음원 파일 로드 처리
    function handleAudioSelect(event) {
        const file = event.target.files[0];
        if (file) {
            const fileURL = URL.createObjectURL(file);
            bgmAudio.src = fileURL;
            isAudioLoaded = true;

            // 파일명 자동 입력 보조
            document.getElementById('audioFileName').value = file.name;
            document.getElementById('statusText').innerText = "준비 완료! [SPACEBAR]를 눌러 녹음을 시작하세요.";
            document.getElementById('statusText').style.color = "#00e5ff";
            updateOutput();
        }
    }

    // 키 입력 감지
    window.addEventListener('keydown', (e) => {
        // 스페이스바로 녹음 및 음악 재생 토글
        if (e.code === 'Space') {
            e.preventDefault();
            if (!isAudioLoaded) {
                alert("먼저 음원 파일(MP3 등)을 선택해 주세요!");
                return;
            }
            toggleRecord();
            return;
        }

        // 녹음 중일 때 노트 기록 (D, F, J, K)
        if (isRecording) {
            const keyIndex = targetKeys.indexOf(e.key.toLowerCase());
            if (keyIndex !== -1) {
                // 음악의 현재 재생 시간(currentTime)을 기준으로 노트 입력 시간 채록 (ms 정밀도)
                const noteTime = parseFloat(bgmAudio.currentTime.toFixed(3));
                recordedNotes.push({ time: noteTime, lane: keyIndex });
                updateOutput();
            }
        }
    });

    // 음악 종료 시 자동 정지
    bgmAudio.onended = () => {
        if (isRecording) toggleRecord();
    };

    function toggleRecord() {
        isRecording = !isRecording;
        const status = document.getElementById('statusText');

        if (isRecording) {
            recordedNotes = [];
            bgmAudio.currentTime = 0;
            bgmAudio.play().catch(e => console.error(e));
            
            status.innerText = "🔴 음악 재생 및 녹음 중... (D, F, J, K 입력)";
            status.style.color = "#00ff88";
        } else {
            bgmAudio.pause();
            status.innerText = "⏹️ 녹음 완료! 아래 코드를 복사하세요.";
            status.style.color = "#ffbb00";
        }
        updateOutput();
    }

    function updateOutput() {
        const title = document.getElementById('songTitle').value || '제목 없음';
        const bpm = parseInt(document.getElementById('songBpm').value) || 120;
        let audioName = document.getElementById('audioFileName').value.trim();
        const speed = parseInt(document.getElementById('songSpeed').value) || 450;

        if (audioName && !audioName.endsWith('.mp3') && !audioName.endsWith('.wav') && !audioName.endsWith('.ogg')) {
            audioName += '.mp3';
        }

        const bgmPath = audioName ? `audio/${audioName}` : 'audio/';
        let notesText = JSON.stringify(recordedNotes, null, 4);

        const fullCode = `if (typeof SONG_DATABASE === 'undefined') {
    var SONG_DATABASE = [];
}

SONG_DATABASE.push({
    title: "${title}",
    bpm: ${bpm},
    bgm: "${bgmPath}",
    speed: ${speed},
    notes: ${notesText}
});`;

        document.getElementById('outputCode').value = fullCode;
    }

    function copyCode() {
        const codeText = document.getElementById('outputCode');
        codeText.select();
        document.execCommand('copy');
        alert("코드가 복사되었습니다! songs/ 폴더 안의 js 파일에 붙여넣으세요.");
    }

    updateOutput();
</script>

</body>
</html>
