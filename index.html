<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리듬게임 채보 오토 에디터</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
        }
        h2 { color: #00e5ff; }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 120px;
            font-weight: bold;
        }
        input {
            padding: 8px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
            width: 250px;
        }
        .instructions {
            background: #333;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            border-left: 4px solid #00e5ff;
        }
        .editor-area {
            display: flex;
            gap: 20px;
        }
        textarea {
            width: 100%;
            height: 350px;
            background: #111;
            color: #00ff88;
            font-family: monospace;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            resize: vertical;
        }
        button {
            padding: 12px 20px;
            background: #00e5ff;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #00b8cc;
        }
        .record-box {
            text-align: center;
            padding: 30px;
            background: #222;
            border: 2px dashed #00e5ff;
            border-radius: 8px;
            margin: 20px 0;
        }
        .key-guide {
            font-size: 20px;
            color: #ffbb00;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎵 채보 자동 생성 오토 에디터</h2>

    <div class="input-group">
        <label>곡 제목 (Title):</label>
        <input type="text" id="songTitle" value="신곡 이름" oninput="updateOutput()">
    </div>
    <div class="input-group">
        <label>BPM:</label>
        <input type="number" id="songBpm" value="120" oninput="updateOutput()">
    </div>
    <div class="input-group">
        <label>음원 파일명:</label>
        <input type="text" id="audioFileName" value="anzs_raid.mp3" placeholder="예: song.mp3" oninput="updateOutput()">
    </div>
    <div class="input-group">
        <label>노트 속도:</label>
        <input type="number" id="songSpeed" value="450" oninput="updateOutput()">
    </div>

    <div class="record-box">
        <h3>[ SPACEBAR ] 누르면 리코딩 시작/정지</h3>
        <p>게임할 음원을 재생하면서 키를 박자에 맞춰 누르면 노트가 기록됩니다!</p>
        <div class="key-guide">사용 키: D, F, J, K</div>
        <h2 id="statusText" style="color: #ff3355; margin-top:15px;">대기 중...</h2>
    </div>

    <h3>최종 생성 코드 (복사해서 곡 JS 파일에 붙여넣기)</h3>
    <textarea id="outputCode" readonly></textarea>
    <br><br>
    <button onclick="copyCode()">코드 전체 복사하기</button>
</div>

<script>
    let isRecording = false;
    let recordStartTime = 0;
    let recordedNotes = [];
    const targetKeys = ['d', 'f', 'j', 'k'];

    window.addEventListener('keydown', (e) => {
        // 스페이스바로 녹음 시작/중지
        if (e.code === 'Space') {
            e.preventDefault();
            toggleRecord();
            return;
        }

        // 녹음 중일 때 노트 입력 처리 (D, F, J, K)
        if (isRecording) {
            const keyIndex = targetKeys.indexOf(e.key.toLowerCase());
            if (keyIndex !== -1) {
                const noteTime = parseFloat(((Date.now() - recordStartTime) / 1000).toFixed(3));
                recordedNotes.push({ time: noteTime, lane: keyIndex });
                updateOutput();
            }
        }
    });

    function toggleRecord() {
        isRecording = !isRecording;
        const status = document.getElementById('statusText');

        if (isRecording) {
            recordedNotes = [];
            recordStartTime = Date.now();
            status.innerText = "🔴 리코딩 중... (키를 누르세요)";
            status.style.color = "#00ff88";
        } else {
            status.innerText = "⏹️ 리코딩 완료!";
            status.style.color = "#ffbb00";
        }
        updateOutput();
    }

    // 🎵 설정값과 녹음된 노트로 채보 JS 코드 자동 구성
    function updateOutput() {
        const title = document.getElementById('songTitle').value || '제목 없음';
        const bpm = parseInt(document.getElementById('songBpm').value) || 120;
        let audioName = document.getElementById('audioFileName').value.trim();
        const speed = parseInt(document.getElementById('songSpeed').value) || 450;

        // 음원 파일명 뒤에 .mp3 확장자가 안 붙어있다면 자동으로 붙여주는 센스
        if (audioName && !audioName.endsWith('.mp3') && !audioName.endsWith('.wav') && !audioName.endsWith('.ogg')) {
            audioName += '.mp3';
        }

        const bgmPath = audioName ? `audio/${audioName}` : 'audio/';

        let notesText = JSON.stringify(recordedNotes, null, 4);

        const fullCode = `if (typeof SONG_DATABASE === 'undefined') {
    var SONG_DATABASE = [];
}

SONG_DATABASE.push({
    title: "${title}",
    bpm: ${bpm},
    bgm: "${bgmPath}",
    speed: ${speed},
    notes: ${notesText}
});`;

        document.getElementById('outputCode').value = fullCode;
    }

    function copyCode() {
        const codeText = document.getElementById('outputCode');
        codeText.select();
        document.execCommand('copy');
        alert("코드가 복사되었습니다! songs/ 폴더 안의 js 파일에 붙여넣으세요.");
    }

    // 페이지 진입 시 초기화
    updateOutput();
</script>

</body>
</html>
